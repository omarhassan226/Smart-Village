<div class="container-fluid website-bg p-3">
    <div class="row">
      <div class="col-lg-6 col-md-12 mt-2">
        <div class="dx-field-label">اسم البائع</div>
        <div class="dx-field">
          <div class="dx-field-value">
  
            <dx-text-box placeholder="ادخل الاسم" [rtlEnabled]="true" [(value)]="name">
              <dx-validator>
                <dxi-validation-rule type="required" message="هذا الحقل مطلوب"></dxi-validation-rule>
              </dx-validator>
            </dx-text-box>
          </div>
        </div>
      </div>
      <div class="col-lg-6 col-md-12 mt-2">
        <div class="dx-field-label">المحتوي باللغه العربيه</div>
        <div class="dx-field">
          <div class="dx-field-value">
            <dx-text-box placeholder="ادخل المحتوي باللغه العربيه"
                         [rtlEnabled]="true" [(value)]="content_ar" >
              <dx-validator>
                <dxi-validation-rule type="required" message="هذا الحقل مطلوب"></dxi-validation-rule>
              </dx-validator>
            </dx-text-box>
          </div>
        </div>
      </div>
      <div class="col-lg-6 col-md-12 mt-2">
        <div class="dx-field-label">المحتوي باللغه الانجليزيه</div>
        <div class="dx-field">
          <div class="dx-field-value">
            <dx-text-box placeholder="ادخل المحتوي باللغه الانجليزيه "
                         [rtlEnabled]="true" [(value)]="content_en" >
              <dx-validator>
                <dxi-validation-rule type="required" message="هذا الحقل مطلوب"></dxi-validation-rule>
              </dx-validator>
            </dx-text-box>
          </div>
        </div>
      </div>
      
    </div>
    <div class="text-center mt-4">
      <dx-button text="أضافة" [useSubmitBehavior]="true" class="btn py-0 default-btn" (click)="addSupplier()"> </dx-button>
    </div>
  </div>
  <div class="container-fluid mt-2 website-bg">
    <div class="container-fluid">
      <dx-data-grid #gridRef
                    [dataSource]="suppliers"
                    width="100%"
                    keyExpr="id"
                    [showBorders]="false"
                    [rtlEnabled]="true"
                    width="100%"
                    [focusedRowEnabled]="false"
                    [columnAutoWidth]="true"
                    [noDataText]="'لايوجد بيانات'">
        <dxo-editing mode="cell"
                     [allowAdding]="true"
                     [allowUpdating]="true"
                     [useIcons]="true">
        </dxo-editing>
  
        <dxi-column dataField="name" dataType="string" [caption]="'الاسم'">
          <dxi-validation-rule type="required" [message]="'Required'">عرض جميع الموردين</dxi-validation-rule>
        </dxi-column>
  
  
        <dxi-column dataType="string"
                    [caption]="' المحتوي باللغه العربيه'"
                    dataField="content_ar">
        </dxi-column>
        <dxi-column dataType="string"
                    [caption]="' المحتوي باللغه الانجليزيه'"
                    dataField="content_en">
        </dxi-column>
  
        <dxi-column type="buttons"
                    cellTemplate="cellTemplate"
                    [caption]="'التحكم'">
          <div *dxTemplate="let cell of 'cellTemplate'">
            <div class="btn-group"
                 role="group"
                 style="direction: ltr"
                 aria-label="Basic example">
              <button type="button" class="btn btn-light" (click)=" showDeletePopup(cell.row.data.id)">
                <i class="far fa-trash-alt text-danger"></i>
              </button>
              <button type="button" class="btn btn-light" (click)="showEditPopup (cell.row.data.id)">
                <i class="far fa-edit" style="transform: rotate(270deg)"></i>
              </button>
            </div>
          </div>
        </dxi-column>
        <dxo-paging [pageSize]="4"></dxo-paging>
        <dxo-pager [showPageSizeSelector]="true"
                   [allowedPageSizes]="[4, 6]"
                   [showInfo]="false">
        </dxo-pager>
      </dx-data-grid>
    </div>
  </div>
  <app-delete-pop-up (whenPopupConfirm)="whenDeletePopupConfirm($event)"
  (whenPopupHide)="hideDeletePopup()"
  [isDeletePopupVisible]="isConfirmDeletePopupVisible"
    >
</app-delete-pop-up>
<dx-popup [visible]="isAdminPopupVisibleEdit"
          [shading]="true"
          [title]="popTitle"
          shadingColor="rgba(0, 0, 0, 0.2)"
          [closeOnOutsideClick]="true"
          [rtlEnabled]="true"
          [maxWidth]="600"
          height="auto"
          dragEnabled="true"
          (onHiding)="hidePopUp()">
  <div *dxTemplate="let data of 'content'">
  
    <div class="row mt-2">
      <div class="col-md-3 mt-1">
        <div class="dx-field-label">اسم البائع</div>
      </div>
      <div class="col-md-9 mt-1">
        <dx-text-box [(value)]="nameEdit" [rtlEnabled]="true" placeholder="البريد الالكتروني">

          <dx-validator>
            
            <dxi-validation-rule type="required" message="هذا الحقل مطلوب"></dxi-validation-rule>
          
          </dx-validator>
        </dx-text-box>
      </div>

    </div>
    <div class="row mt-2">
      <div class="col-md-3 mt-1">
        <div class="dx-field-label"> المحتوي باللغه العربيه</div>
      </div>
      <div class="col-md-9 mt-1">
        <dx-text-box [(value)]="content_arEdit" [rtlEnabled]="true" placeholder="البريد الالكتروني">

          <dx-validator>
            <dxi-validation-rule type="required" message="هذا الحقل مطلوب"></dxi-validation-rule>
          
          </dx-validator>
        </dx-text-box>
      </div>

    </div>
    <div class="row mt-2">
        <div class="col-md-3 mt-1">
          <div class="dx-field-label"> المحتوي باللغه الانجليزيه</div>
        </div>
        <div class="col-md-9 mt-1">
          <dx-text-box [(value)]="content_enEdit" [rtlEnabled]="true" placeholder="البريد الالكتروني">
  
            <dx-validator>
              <dxi-validation-rule type="required" message="هذا الحقل مطلوب"></dxi-validation-rule>
              
            </dx-validator>
          </dx-text-box>
        </div>
  
      </div>
 

    
    <div class="row mt-2">
      <div class="col-md-3 col-sm-4 mx-auto mt-3">
        <dx-button class="dilvery-list-add-btn" (onClick)="editSupplier()" [useSubmitBehavior]="true" text="حفظ"> </dx-button>
      </div>
    </div>
  </div>
</dx-popup>
