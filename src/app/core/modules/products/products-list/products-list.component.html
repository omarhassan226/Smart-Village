  <dx-data-grid
    #gridRef
    [dataSource]="ProductsList"
    width="100%"
    keyExpr="id"
    [showBorders]="true"
    [rtlEnabled]="true"
    width="100%"
    [focusedRowEnabled]="true"
    [columnAutoWidth]="true"
    (onCellClick)="onCellClicked($event)"
    [noDataText]="'لايوجد بيانات'"
    (onToolbarPreparing)="onToolbarPreparing($event)"
  >
  <dxo-search-panel [visible]="true" [placeholder]="''"> </dxo-search-panel>


    <dxi-column width="70" cellTemplate="cellTemplate1" [caption]="'الصورة'">
      <div *dxTemplate="let cell of 'cellTemplate1'">
       
        <img
          height="42px"
          width="42px"
          src="https://smartvillageapp.com/app/{{cell?.row?.data?.image?.image}}"
        />
      </div>
    </dxi-column>

    <dxi-column dataField="full_name" dataType="string" [caption]="'الاسم'">

    </dxi-column>

   
    <dxi-column dataType="string" [caption]="'السعر'" dataField="price">
    </dxi-column>
    <dxi-column dataType="string" [caption]="'التصنيفات'" dataField="main_categories[0].category_ar">
    </dxi-column>
    <dxi-column dataType="string" [caption]="'الكمية'" dataField="stock">
    </dxi-column>
    <dxi-column dataType="string" [caption]="'البائع'" dataField="salesman.name">
    </dxi-column>

    <dxi-column type="buttons" cellTemplate="cellTemplate" [caption]="'التحكم'">
      <div *dxTemplate="let cell of 'cellTemplate'">
        <div
          class="btn-group"
          role="group"
          style="direction: ltr"
          aria-label="Basic example"
        >
          <dx-button (click)="showDeletePopUp.emit(gridRef.focusedRowKey)" class="btn btn-light text-danger">
            <i class="far fa-trash-alt"></i>
          </dx-button>

          <dx-button class="btn btn-light" (onClick)="showTabs.emit(gridRef.focusedRowKey)"
            ><i class="far fa-edit" style="transform: rotate(270deg)"></i
          ></dx-button>
        </div>
      </div>
    </dxi-column>

    <dxo-paging [pageSize]="5"></dxo-paging>
    <dxo-pager
      [showPageSizeSelector]="true"
      [allowedPageSizes]="[5, 10]"
      [showInfo]="false"
    >
    </dxo-pager>
  </dx-data-grid>
</div>
