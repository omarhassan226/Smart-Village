<section class="container-fluid py-2" style="background-color: #f8f8f8">
  <div class="row">
    <div class="col-md-6 mt-3">

      <div class="setting-item">
        <h6 class="font-weight-bold text-right">العنوان</h6>
        <div class="cancel-order-textarea">
          <dx-text-box [(value)]="quality"
                       placeholder="يمكنك الكتابة هنا">
            <dx-validator>
              <dxi-validation-rule type="required" message="هذا الحقل مطلوب"></dxi-validation-rule>
            </dx-validator>
          </dx-text-box>
        </div>
      </div>
      <div class="setting-item">
        <h6 class="font-weight-bold text-right">الوصف</h6>
        <div class="cancel-order-textarea">
          <dx-text-area [(value)]="description"
                        placeholder="يمكنك الكتابة هنا"
                        height="200">
            <dx-validator>
              <dxi-validation-rule type="required" message="هذا الحقل مطلوب"></dxi-validation-rule>
            </dx-validator>
          </dx-text-area>
        </div>
      </div>
      <div class="setting-item">
    <h6 class="font-weight-bold text-right">  صوره الاشعار</h6>
    <div class="image-upload-lg">
      <label for="fileMain-input">
        <img [src]="imgSrc2" style="width: 100%; height: 100px;" />
        <input hidden id="fileMain-input" type="file" (change)="showPreview1($event)" />
      </label>

    </div>

  </div>

      <div class="text-center mt-4">
        <dx-button text="ارسال" [useSubmitBehavior]="true" class="btn py-0 default-btn" (click)="addNotification()"> </dx-button>
      </div>
    </div>
    <div class="col-md-6 mt-3">



      <h6 class="font-weight-bold text-right">الاشعارات الحديثه</h6>
      <div class="list-container py-3 bg-white">
        <dx-list [items]="products" height="100%" [noDataText]="'لاتوجد الاشعارات '">


          <div *dxTemplate="let item of 'item'" class="list-product">
            <div class="col-md-12 py-3" style=" background-color: #f8f8f8 ;border:#757373  solid 1px  
">

            
               {{ item.body }}


  

             
            </div>
          </div>

        </dx-list>
      </div>
    </div>
      </div>







</section>
