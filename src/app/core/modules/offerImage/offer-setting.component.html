<section class="container-fluid mt-2">
    <div class="row">
        <div class="col-md-12" style="clear: both">
            <div>
              <h6 class="text-right"> اعدادت العرض</h6>
              <div class="line-border"></div>
              <div class="row">
                <div class="col-lg-4 col-md-12 mt-1">
                    <h6 class="font-weight-bold text-right"> الصورة </h6>
                    <div class="image-upload-lg">
                        <label for="file-input1">
                          <div>
                            <img
                              height="140px"
                              [src]="obj.iamgeUrl"
                              
                              alt=""
                            />
                          </div>
                          
                        </label>
                        <div class="text-center"> صورة العرض </div>
                       
          
                        <input #imageAr  (change)="uploadFile($event)" accept="image/*" id="file-input1" type="file" />
                      </div>
                </div>
                <div class="col-lg-4 col-md-12 mt-1">
                    <h6 class="font-weight-bold text-right">الاسم باللغة العربية</h6>
                  <div class="dx-field">
                    <div class="dx-field-value">
                      <dx-text-box [rtlEnabled]="true"[(value)]="obj.category_ar"  placeholder="يمكنك الكتابة هنا">
                        <dx-validator>
                          <dxi-validation-rule type="required" message="هذا الحقل مطلوب"></dxi-validation-rule>
                      </dx-validator>
                      </dx-text-box>
                    </div>  
                    
                  </div>
                  <h6 class="font-weight-bold text-right">الاسم باللغة الأنجليزية</h6>
                  <div class="dx-field">
                    <div class="dx-field-value">
                      <dx-text-box [rtlEnabled]="true"[(value)]="obj.category_en"  placeholder="يمكنك الكتابة هنا" >
                        <dx-validator>
                          <dxi-validation-rule type="required" message="هذا الحقل مطلوب"></dxi-validation-rule>
                      </dx-validator>
                      </dx-text-box>
                    </div>
                   
                  </div>
                  <h6 class="font-weight-bold text-right"> الحالة</h6>
                  <div class="dx-field">
                    <div class="dx-field">
                        <div class="dx-field-value">
                
                          <dx-select-box [dataSource]="status" [(value)]="obj.status" displayExpr="name"
                          valueExpr="id" [rtlEnabled]="true" placeholder="الحالة"  >
              <dx-validator>
               <dxi-validation-rule type="required" message="هذا الحقل مطلوب"></dxi-validation-rule>
              </dx-validator>
              </dx-select-box>
                        </div>
                      </div>
                   
                  </div>
                </div>
                <div class="col-lg-4 text-center col-md-12 mt-4" style="margin-top: 10px;">
                  <dx-button text="حفظ التعديلات" class="btn py-0 default-btn" [useSubmitBehavior]="true" (click)="save()" >
                  </dx-button>
                </div>
              </div>
            </div>
          </div>
      </div>
      </section>
