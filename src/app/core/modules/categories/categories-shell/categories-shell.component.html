<section class="container-fluid mt-2">
  <div class="row">
    <div class="col-md-4 website-bg">
      <div class="list-container website-bg">
        <div class="text-right bg-white p-3">
          <h6>الأقسام الرئيسية</h6>
        </div>
        <dx-list
          class="list-container"
          style="height: 300px"
          #list
          [dataSource]="categories"
          [noDataText]="'لايوجد بيانات'"
          searchExpr="category_ar"
          searchMode="contains"
        >
          <div *dxTemplate="let data of 'item'; let i = index" class="list-item mt-2">
            <div class="d-inline" style="position: relative; top: 12px">
              {{i+1}} - {{ data.category_ar }}
            </div>
            <div class="d-inline float-left">
              <div
                class="btn-group"
                role="group"
                style="direction: ltr"
                aria-label="Basic example"
              >
                <button type="button" class="btn btn-light"  (click)="showDeletePopup(data.id)" >
                  <i class="far fa-trash-alt text-danger"></i>
                </button>
                <button type="button" class="btn btn-light"(click)=" getCategoryById (data.id)">
                  <i class="far fa-edit" style="transform: rotate(270deg)" ></i>
                </button>
              </div>
            </div>
          </div>
        </dx-list>
        <div class="mt-2 text-center">
          <dx-button
            class="btn text-default font-weight-bold"
            style="background-color: #bfefed;"
            text="أضافة قسم جديد"
          ></dx-button>
        </div>
      </div>
    </div>
    <div class="col-md-8" style="clear: both">
      <div>
        <h6 class="text-right">القسم الرئيسي</h6>
        <div class="line-border"></div>
        <div class="row">
          <div class="col-lg-4 col-md-12 mt-1">
            <div class="image-upload-lg">
              <label for="fileMain-input">
                <img [src]="mainCategory.iamgeUrl" style="width: 100%; height: 70px;" />
              </label>
              <div class="text-center">أيقونة التصنيف</div>

              <input id="fileMain-input" type="file" (change)="uploadFile($event)" />
            </div>
          </div>
          <div class="col-lg-4 col-md-12 mt-1">
            <div class="dx-field-label">الاسم باللغة العربية</div>
            <div class="dx-field">
              <div class="dx-field-value">
                <dx-text-box [rtlEnabled]="true"[(value)]="mainCategory.category_ar">
                  <dx-validator>
                    <dxi-validation-rule type="required" message="هذا الحقل مطلوب"></dxi-validation-rule>
                </dx-validator>
                </dx-text-box>
              </div>  
              
            </div>
            <div class="dx-field-label">الاسم باللغة الأنجليزية</div>
            <div class="dx-field">
              <div class="dx-field-value">
                <dx-text-box [rtlEnabled]="true"[(value)]="mainCategory.category_en" >
                  <dx-validator>
                    <dxi-validation-rule type="required" message="هذا الحقل مطلوب"></dxi-validation-rule>
                </dx-validator>
                </dx-text-box>
              </div>
             
            </div>
            <div class="dx-field-label">  الترتيب</div>
            <div class="dx-field">
              <div class="dx-field-value">
                <dx-text-box [rtlEnabled]="true"[(value)]="mainCategory.sortnumber" >
                  <dx-validator>
                    <dxi-validation-rule type="required" message="هذا الحقل مطلوب"></dxi-validation-rule>
                </dx-validator>
                </dx-text-box>
              </div>
             
            </div>
          </div>
          <div class="col-lg-4 text-center col-md-12 mt-4">
            <dx-button text="حفظ التعديلات" class="btn py-0 default-btn" [useSubmitBehavior]="true" (click)="addCategory()">
            </dx-button>
          </div>
        </div>
        <h6 class="text-right">الاٌقسام الفرعية</h6>
        <div class="line-border"></div>
      
      <div *ngFor="let item of sub_Categories;let i=index">
        <div class="row"  >
    
          <div class="col-lg-3 col-md-12 mt-1">
            <div class="image-upload">
              <label for="{{i}}-input">
                <img [src]="item.iamgeUrl"  style="width: 100%; height: 100%;"/>
              </label>

              <input id="{{i}}-input" type="file" (change)="showPreview($event,i)" />
            </div>
          </div>
          <div class="col-lg-3 col-md-12 mt-1">
            <div class="dx-field-label">الاسم باللغة العربية</div>
            <div class="dx-field">
              <div class="dx-field-value">
                <dx-text-box [rtlEnabled]="true" [(value)]="item.category_ar">  <dx-validator>
                  <dxi-validation-rule type="required" message="هذا الحقل مطلوب"></dxi-validation-rule>
              </dx-validator></dx-text-box>
              </div>
            
            </div>
            <div class="dx-field-label">  الترتيب</div>
            <div class="dx-field">
              <div class="dx-field-value">
                <dx-text-box [rtlEnabled]="true" [(value)]="item.sortnumber">  <dx-validator>
                  <dxi-validation-rule type="required" message="هذا الحقل مطلوب"></dxi-validation-rule>
              </dx-validator></dx-text-box>
              </div>
            
            </div>
          </div>
          <div class="col-lg-3 col-md-12 mt-1">
            <div class="dx-field-label">الاسم باللغة الأنجليزية</div>
            <div class="dx-field">
              <div class="dx-field-value">
                <dx-text-box [rtlEnabled]="true" [(value)]="item.category_en"><dx-validator>
                  <dxi-validation-rule type="required" message="هذا الحقل مطلوب"></dxi-validation-rule>
              </dx-validator></dx-text-box>
              </div>
              
            </div>
          </div>
          

          <div class="col-lg-3 text-center col-md-12 mt-4">
            <dx-button type="danger" icon="far fa-trash-alt" (click)="deleteItem (i)">
            </dx-button>
          </div>
       
    
       
       
       
        </div>
      </div>
        <div class="col-lg-3 text-center col-md-12 mt-4">
          <dx-button text="أضافة جديد" class="btn py-0 default-btn" (click)="addItem()" >
          </dx-button>
        </div>
      </div>
    </div>
  </div>
</section>
<app-delete-pop-up
  (whenPopupConfirm)="whenDeletePopupConfirm($event)"
  (whenPopupHide)="hideDeletePopup()"
  [isDeletePopupVisible]="isConfirmDeletePopupVisible"
  >
</app-delete-pop-up>
